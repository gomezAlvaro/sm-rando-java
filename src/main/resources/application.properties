# Spring Boot Application Configuration
spring.application.name=map-randomizer
server.port=8080

# CORS Configuration for Vue.js Frontend
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# File Storage Configuration
app.storage.seeds-dir=seeds
app.storage.spoiler-dir=seeds/spoilers

# ROM Generation Configuration
randomizer.base-rom-path=./data/vanilla.smc
randomizer.rom-output-dir=./roms
randomizer.cache-generated-roms=true

# Jackson JSON Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# Logging Configuration
logging.level.com.maprando=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n